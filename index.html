<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR IN MAKING</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
   <main>
<!-- CALCULATOR SECTION -->
<div class="calculator_wrapper">
<input type="text" id="display" class="display" readonly placeholder="0">
<div class="buttons">
    <button onclick="erase()">C</button>
    <button onclick="eraseLast()">DEL</button>
    <button onclick="append('/')">/</button>
    <button onclick="append('*')">*</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('-')">-</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('+')">+</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button onclick="append('%')">%</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="equal" onclick="calculation()">=</button>
   


</div>



</div>


   </main>
<footer>


</footer>
<script src="script.js"></script>
</body>
</html>
